<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>TriviaAlarm — Accounts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #14231F;
    --surface: #1C332C;
    --surface-raised: #233D34;
    --brass: #C9A227;
    --brass-bright: #E0BC4A;
    --alarm-red: #C1443D;
    --chalk: #EDE6D6;
    --muted: #8FA79C;
    --line: rgba(237, 230, 214, 0.12);
    --font-display: 'Fraunces', serif;
    --font-digit: 'Space Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg-deep);
    color: var(--chalk);
    font-family: var(--font-body);
    min-height: 100vh;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 56px 24px; }
  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.9rem;
    margin: 0 0 6px;
  }
  .sub { color: var(--muted); margin: 0 0 36px; font-size: 0.95rem; }

  .gate {
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px;
  }
  .gate label {
    display: block;
    font-family: var(--font-digit);
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .gate input {
    width: 100%;
    font-family: var(--font-body);
    font-size: 0.98rem;
    color: var(--chalk);
    background: var(--surface-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .gate button {
    width: 100%;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--bg-deep);
    background: var(--brass-bright);
    border: none;
    padding: 13px 0;
    border-radius: 100px;
    cursor: pointer;
  }
  .gate-error { color: var(--alarm-red); font-size: 0.85rem; margin-top: 12px; min-height: 18px; }

  #dashboard { display: none; }
  #dashboard.show { display: block; }

  .stat {
    font-family: var(--font-digit);
    color: var(--brass);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
  th, td { text-align: left; padding: 12px 16px; font-size: 0.92rem; border-bottom: 1px solid var(--line); }
  th { font-family: var(--font-digit); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); background: var(--surface-raised); }
  tr:last-child td { border-bottom: none; }
  td.muted { color: var(--muted); font-family: var(--font-digit); font-size: 0.82rem; }

  .empty { color: var(--muted); padding: 24px 0; }
  .refresh {
    font-family: var(--font-digit);
    font-size: 0.78rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 8px 16px;
    cursor: pointer;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>TriviaAlarm accounts</h1>
  <p class="sub">Everyone who's created an account, straight from your own site.</p>

  <div class="gate" id="gate">
    <label for="adminKey">Admin key</label>
    <input type="password" id="adminKey" placeholder="Enter your admin key" autocomplete="off">
    <button id="unlockBtn" type="button">View signups</button>
    <p class="gate-error" id="gateError"></p>
  </div>

  <div id="dashboard">
    <button class="refresh" id="refreshBtn" type="button">↻ Refresh</button>
    <p class="stat" id="statLine"></p>
    <div id="tableHolder"></div>
  </div>
</div>

<script>
  const gate = document.getElementById('gate');
  const dashboard = document.getElementById('dashboard');
  const adminKeyInput = document.getElementById('adminKey');
  const unlockBtn = document.getElementById('unlockBtn');
  const gateError = document.getElementById('gateError');
  const refreshBtn = document.getElementById('refreshBtn');
  const statLine = document.getElementById('statLine');
  const tableHolder = document.getElementById('tableHolder');

  let storedKey = '';

  async function loadSignups() {
    gateError.textContent = '';
    try {
      const res = await fetch('/.netlify/functions/list-users', {
        headers: { 'x-admin-key': storedKey }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Unable to load accounts');

      gate.style.display = 'none';
      dashboard.classList.add('show');
      statLine.textContent = `${data.count} ${data.count === 1 ? 'account has' : 'accounts have'} been created`;

      if (!data.users.length) {
        tableHolder.innerHTML = '<p class="empty">No accounts yet.</p>';
        return;
      }

      const rows = data.users.map(u => `
        <tr>
          <td>${escapeHtml(u.name || '')}</td>
          <td>${escapeHtml(u.email || '')}</td>
          <td class="muted">${u.settings ? escapeHtml(u.settings.alarmTime) : ''}</td>
          <td class="muted">${u.settings ? escapeHtml(u.settings.category) : ''}</td>
          <td class="muted">${u.createdAt ? new Date(u.createdAt).toLocaleString() : ''}</td>
        </tr>
      `).join('');

      tableHolder.innerHTML = `
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Alarm time</th><th>Category</th><th>Joined</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (err) {
      gateError.textContent = err.message || 'Something went wrong';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  unlockBtn.addEventListener('click', () => {
    storedKey = adminKeyInput.value.trim();
    if (!storedKey) {
      gateError.textContent = 'Enter your admin key.';
      return;
    }
    loadSignups();
  });

  adminKeyInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') unlockBtn.click();
  });

  refreshBtn.addEventListener('click', loadSignups);
</script>
</body>
</html>
